<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Feed — DataBridge</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root {
  --bg: #F2F5F8;
  --surface: #fff;
  --navy: #1B2D3D;
  --navy2: #2E4A60;
  --teal: #3DCFB4;
  --teal-a: rgba(61,207,180,0.12);
  --border: rgba(27,45,61,0.08);
  --txt: #1B2D3D;
  --txt2: #4A6070;
  --txt3: #8A9BB0;
  --red: #D64949;
  --amber: #C87941;

  /* Platform colors */
  --hn: #FF6600;
  --reddit: #FF4500;
  --github: #1B2D3D;
  --threads: #000000;
  --x: #1DA1F2;
  --linkedin: #0077B5;
  --manual: #8A9BB0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--txt); min-height: 100vh; }

/* HEADER */
.header { background: var(--navy); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-brand { display: flex; align-items: center; gap: 8px; }
.header-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); }
.header-name { font-size: 14px; font-weight: 800; color: #fff; }
.header-right { display: flex; align-items: center; gap: 10px; }
.header-updated { font-size: 10px; color: rgba(255,255,255,0.3); }
.btn-refresh { background: rgba(61,207,180,0.15); border: 1px solid rgba(61,207,180,0.3); color: var(--teal); font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: inherit; }
.btn-refresh:hover { background: rgba(61,207,180,0.25); }

/* TOOLBAR */
.toolbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
.filter-btn { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--txt2); cursor: pointer; font-family: inherit; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
.filter-btn:hover { background: var(--border); }
.filter-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
.filter-btn .platform-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.toolbar-sep { width: 1px; height: 20px; background: var(--border); }
.search-wrap { flex: 1; max-width: 280px; }
.search-input { width: 100%; font-size: 12px; padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--txt); font-family: inherit; outline: none; }
.search-input:focus { border-color: var(--teal); }
.count-badge { font-size: 10px; color: var(--txt3); margin-left: auto; }

/* ADD URL */
.add-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 24px; display: flex; gap: 8px; align-items: center; }
.url-input { flex: 1; font-size: 12px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; outline: none; color: var(--txt); }
.url-input:focus { border-color: var(--teal); }
.btn-add { background: var(--teal); color: var(--navy); font-size: 11px; font-weight: 800; padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; white-space: nowrap; }
.btn-add:hover { opacity: 0.9; }

/* GRID — 3-col masonry-style */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; padding: 18px 24px; align-items: start; }

/* SOCIAL CARD */
.card {
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  transition: box-shadow 0.15s, transform 0.1s;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.1); transform: translateY(-1px); }
.card.approved { border-left: 3px solid var(--teal); }
.card.applied { border-left: 3px solid var(--txt3); opacity: 0.65; }

/* card header row */
.card-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.card-badges { display: flex; align-items: center; gap: 6px; }

/* Platform badge */
.platform-badge {
  font-size: 10px;
  font-weight: 800;
  padding: 2px 8px;
  border-radius: 4px;
  color: #fff;
  letter-spacing: 0.3px;
  white-space: nowrap;
}
.platform-badge.hn      { background: var(--hn); }
.platform-badge.reddit  { background: var(--reddit); }
.platform-badge.github  { background: var(--github); }
.platform-badge.threads { background: var(--threads); }
.platform-badge.x       { background: var(--x); }
.platform-badge.linkedin{ background: var(--linkedin); }
.platform-badge.manual  { background: var(--manual); }
.platform-badge.changelog { background: var(--teal); color: var(--navy); }

/* Tag badge */
.tag-badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 3px; background: var(--teal-a); color: var(--teal); white-space: nowrap; }
.tag-badge.mcp     { background: rgba(106,74,138,0.1); color: #6A4A8A; }
.tag-badge.viz     { background: rgba(74,122,155,0.1); color: var(--navy2); }
.tag-badge.prompt  { background: rgba(200,121,65,0.12); color: var(--amber); }
.tag-badge.front   { background: rgba(74,106,74,0.1); color: #4A6A4A; }
.tag-badge.etc     { background: rgba(27,45,61,0.06); color: var(--txt2); }

/* Author + time row */
.card-author { font-size: 11px; color: var(--txt3); display: flex; align-items: center; gap: 5px; }
.card-author .author-name { color: var(--txt2); font-weight: 600; }

/* Title */
.card-title { font-size: 14px; font-weight: 700; color: var(--txt); line-height: 1.4; }

/* Body text */
.card-body {
  font-size: 12px;
  color: var(--txt2);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Stats row */
.card-stats { display: flex; align-items: center; gap: 12px; }
.stat-item { font-size: 11px; color: var(--txt3); display: flex; align-items: center; gap: 3px; }
.stat-item .stat-num { font-weight: 600; color: var(--txt2); }

/* Actions row */
.card-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 2px; }
.btn-link { font-size: 10px; color: var(--txt3); text-decoration: none; padding: 4px 10px; border: 1px solid var(--border); border-radius: 5px; transition: all 0.15s; }
.btn-link:hover { color: var(--navy); border-color: var(--navy2); }
.btn-hn-link { font-size: 10px; color: var(--hn); text-decoration: none; padding: 4px 10px; border: 1px solid rgba(255,102,0,0.25); border-radius: 5px; }
.btn-hn-link:hover { background: rgba(255,102,0,0.07); }
.btn-apply { font-size: 10px; font-weight: 700; padding: 5px 11px; border-radius: 5px; border: none; cursor: pointer; font-family: inherit; background: var(--navy); color: #fff; margin-left: auto; white-space: nowrap; }
.btn-apply:hover { background: var(--navy2); }
.btn-apply.approved { background: var(--teal); color: var(--navy); }
.btn-applied { font-size: 10px; color: var(--txt3); padding: 5px 11px; border: 1px solid var(--border); border-radius: 5px; background: transparent; cursor: default; font-family: inherit; margin-left: auto; }

/* CHAPTER MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(27,45,61,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; }
.modal { background: var(--surface); border-radius: 12px; padding: 24px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.modal-title { font-size: 14px; font-weight: 800; margin-bottom: 4px; }
.modal-sub { font-size: 11px; color: var(--txt2); margin-bottom: 16px; }
.chapter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 16px; }
.chapter-btn { font-size: 10px; font-weight: 700; padding: 6px 4px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--txt2); cursor: pointer; font-family: inherit; text-align: center; }
.chapter-btn:hover { background: var(--border); }
.chapter-btn.sel { background: var(--navy); color: #fff; border-color: var(--navy); }
.modal-note { width: 100%; font-size: 11px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; resize: vertical; min-height: 60px; outline: none; margin-bottom: 12px; }
.modal-note:focus { border-color: var(--teal); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel { font-size: 12px; padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px; background: transparent; cursor: pointer; font-family: inherit; }
.btn-confirm { font-size: 12px; font-weight: 700; padding: 7px 16px; border: none; border-radius: 6px; background: var(--teal); color: var(--navy); cursor: pointer; font-family: inherit; }

.empty { text-align: center; padding: 60px 24px; color: var(--txt3); font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="header-dot"></div>
    <span class="header-name">AI Feed</span>
    <span style="font-size:10px;color:rgba(255,255,255,0.3);margin-left:4px;">DataBridge × Script</span>
  </div>
  <div class="header-right">
    <span class="header-updated" id="updated-at">로딩 중...</span>
    <button class="btn-refresh" onclick="loadFeed()">새로고침</button>
  </div>
</div>

<div class="toolbar">
  <!-- Platform filter tabs -->
    <div class="filter-group" id="platform-filters">
    <button class="filter-btn active" data-platform="all" onclick="setFilter('platform','all',this)">전체</button>
    <button class="filter-btn" data-platform="X" onclick="setFilter('platform','X',this)">
      <span class="platform-dot" style="background:var(--x)"></span>X
    </button>
    <button class="filter-btn" data-platform="HN" onclick="setFilter('platform','HN',this)">
      <span class="platform-dot" style="background:var(--hn)"></span>HN
    </button>
    <button class="filter-btn" data-platform="Reddit" onclick="setFilter('platform','Reddit',this)">
      <span class="platform-dot" style="background:var(--reddit)"></span>Reddit
    </button>
    <button class="filter-btn" data-platform="GitHub" onclick="setFilter('platform','GitHub',this)">
      <span class="platform-dot" style="background:var(--github)"></span>GitHub
    </button>
    <button class="filter-btn" data-platform="Threads" onclick="setFilter('platform','Threads',this)">
      <span class="platform-dot" style="background:var(--threads)"></span>Threads
    </button>
    <button class="filter-btn" data-platform="LinkedIn" onclick="setFilter('platform','LinkedIn',this)">
      <span class="platform-dot" style="background:var(--linkedin)"></span>LinkedIn
    </button>
    <button class="filter-btn" data-platform="manual" onclick="setFilter('platform','manual',this)">
      <span class="platform-dot" style="background:var(--manual)"></span>직접추가
    </button>
  </div>
  <div class="toolbar-sep"></div>
  <!-- Tag filter -->
  <div class="filter-group" id="tag-filters">
    <button class="filter-btn active" data-tag="all" onclick="setFilter('tag','all',this)">전체 태그</button>
    <button class="filter-btn" data-tag="Claude Code" onclick="setFilter('tag','Claude Code',this)">Claude Code</button>
    <button class="filter-btn" data-tag="MCP" onclick="setFilter('tag','MCP',this)">MCP</button>
    <button class="filter-btn" data-tag="데이터 시각화" onclick="setFilter('tag','데이터 시각화',this)">데이터 시각화</button>
    <button class="filter-btn" data-tag="프롬프트" onclick="setFilter('tag','프롬프트',this)">프롬프트</button>
    <button class="filter-btn" data-tag="기타" onclick="setFilter('tag','기타',this)">기타</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="search-wrap">
    <input class="search-input" placeholder="검색..." id="search-input" oninput="renderCards()">
  </div>
  <span class="count-badge" id="count-badge"></span>
</div>

<div class="add-bar">
  <input class="url-input" id="url-input" placeholder="URL 붙여넣기 (GitHub, X, 링크드인, Reddit, HN, Threads...)">
  <button class="btn-add" onclick="addUrl()">+ 추가</button>
</div>

<div class="grid" id="grid"></div>

<!-- 챕터 선택 모달 -->
<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal">
    <div class="modal-title">스크립트에 반영</div>
    <div class="modal-sub" id="modal-item-title"></div>
    <div id="modal-recommend" style="margin-bottom:14px;padding:12px;background:#f4f6f9;border-radius:8px;border-left:3px solid var(--teal);">
      <div style="font-size:10px;font-weight:700;color:#8A9BB0;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">Min 추천 챕터</div>
      <div id="modal-recommend-chapter" style="font-size:15px;font-weight:800;color:#1B2D3D;margin-bottom:4px;"></div>
      <div id="modal-recommend-reason" style="font-size:11px;color:#4A6070;line-height:1.5;"></div>
    </div>
    <textarea class="modal-note" id="modal-note" placeholder="메모 (선택)"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-confirm" onclick="confirmApply()">승인 →</button>
    </div>
  </div>
</div>

<script>
const CHAPTERS = ['CH00','CH01','CH02','CH03','CH04','CH05','CH06','CH07','CH08','CH09','CH10','CH11','CH12','CH13','CH14'];
const FEED_URL = './data/feed.json';

let allItems = [];
let localItems = JSON.parse(localStorage.getItem('ai-feed-local') || '[]');
let filters = { platform: 'all', tag: 'all' };
let currentItem = null;
let selectedChapter = '';

// ── Platform helpers ──────────────────────────────────────────────
function detectPlatform(url) {
  if (!url) return 'manual';
  const u = url.toLowerCase();
  if (u.includes('news.ycombinator.com')) return 'HN';
  if (u.includes('reddit.com'))           return 'Reddit';
  if (u.includes('github.com'))           return 'GitHub';
  if (u.includes('threads.net'))          return 'Threads';
  if (u.includes('twitter.com') || u.includes('x.com')) return 'X';
  if (u.includes('linkedin.com'))         return 'LinkedIn';
  return 'manual';
}

function platformKey(platform) {
  const m = { 'HN': 'hn', 'Reddit': 'reddit', 'GitHub': 'github', 'Threads': 'threads', 'X': 'x', 'LinkedIn': 'linkedin' };
  return m[platform] || 'manual';
}

function platformColor(platform) {
  const m = {
    'HN': '#FF6600', 'Reddit': '#FF4500', 'GitHub': '#1B2D3D',
    'Threads': '#000000', 'X': '#1DA1F2', 'LinkedIn': '#0077B5'
  };
  return m[platform] || '#8A9BB0';
}

function itemPlatform(item) {
  if (item.platform) return item.platform;
  if (item.type === 'github_repo' || item.type === 'changelog') return 'GitHub';
  if (item.type === 'hn') return 'HN';
  if (item.type === 'reddit') return 'Reddit';
  if (item.type === 'manual') return detectPlatform(item.url);
  return 'GitHub';
}

// ── Feed loading ──────────────────────────────────────────────────
async function loadFeed() {
  try {
    const r = await fetch(FEED_URL + '?t=' + Date.now());
    const data = await r.json();
    allItems = data.items || [];
    localItems.forEach(local => {
      const idx = allItems.findIndex(i => i.id === local.id);
      if (idx >= 0) allItems[idx] = { ...allItems[idx], ...local };
      else allItems.unshift(local);
    });
    document.getElementById('updated-at').textContent = '업데이트 ' + new Date(data.updated_at).toLocaleString('ko');
    renderCards();
  } catch(e) {
    allItems = localItems;
    document.getElementById('updated-at').textContent = '오프라인 (로컬 데이터)';
    renderCards();
  }
}

function setFilter(type, value, btn) {
  filters[type] = value;
  document.querySelectorAll(`#${type}-filters .filter-btn`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function tagClass(tag) {
  const m = { 'Claude Code': '', 'MCP': 'mcp', '데이터 시각화': 'viz', '프롬프트': 'prompt', '프론트엔드': 'front' };
  return m[tag] || 'etc';
}

function relativeTime(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)   return '방금';
  if (m < 60)  return `${m}분 전`;
  const h = Math.floor(m / 60);
  if (h < 24)  return `${h}시간 전`;
  const d = Math.floor(h / 24);
  if (d < 30)  return `${d}일 전`;
  return dateStr.slice(0, 10);
}

// ── Render ────────────────────────────────────────────────────────
function renderCards() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let items = allItems.filter(item => {
    const plat = itemPlatform(item);
    // platform filter: 'manual' tab catches manual + unknown platforms
    if (filters.platform !== 'all') {
      if (filters.platform === 'manual') {
        if (!['manual','Threads','X','LinkedIn'].includes(plat) && item.type !== 'manual') return false;
      } else {
        if (plat !== filters.platform) return false;
      }
    }
    if (filters.tag !== 'all' && item.tag !== filters.tag) return false;
    if (q && !((item.title||'').toLowerCase().includes(q) ||
               (item.description||'').toLowerCase().includes(q) ||
               (item.full_name||'').toLowerCase().includes(q) ||
               (item.author||'').toLowerCase().includes(q))) return false;
    return true;
  });
  document.getElementById('count-badge').textContent = items.length + '개';

  const grid = document.getElementById('grid');
  if (!items.length) {
    grid.innerHTML = '<div class="empty">표시할 항목이 없어요</div>';
    return;
  }

  grid.innerHTML = items.map(item => {
    const plat = itemPlatform(item);
    const platKey = platformKey(plat);
    const score = item.score ?? item.stars ?? 0;
    const comments = item.comments ?? 0;
    const author = item.author || '';
    const timeStr = relativeTime(item.created_at || item.updated_at || item.fetched_at);
    const body = item.description || '';

    // platform badge
    const platBadge = `<span class="platform-badge ${platKey}">${plat}</span>`;

    // tag badge
    const tagB = item.tag ? `<span class="tag-badge ${tagClass(item.tag)}">${item.tag}</span>` : '';

    // author line
    const authorLine = author
      ? `<div class="card-author"><span>👤</span><span class="author-name">${escHtml(author)}</span>${timeStr ? `<span>·</span><span>${timeStr}</span>` : ''}</div>`
      : (timeStr ? `<div class="card-author"><span>${timeStr}</span></div>` : '');

    // title
    const titleLine = `<div class="card-title">${escHtml(item.title || item.full_name || '')}</div>`;

    // body
    const bodyLine = body ? `<div class="card-body">${escHtml(body)}</div>` : '';

    // stats
    const statsLine = `<div class="card-stats">
      <span class="stat-item">❤ <span class="stat-num">${score.toLocaleString()}</span></span>
      ${comments ? `<span class="stat-item">💬 <span class="stat-num">${comments.toLocaleString()}</span></span>` : ''}
      <a class="btn-link" href="${item.url}" target="_blank">🔗 원문</a>
      ${item.hn_url && item.hn_url !== item.url ? `<a class="btn-hn-link" href="${item.hn_url}" target="_blank">HN 댓글</a>` : ''}
      <button class="btn-translate" onclick="translateCard('${escAttr(item.id)}', this)" data-id="${escAttr(item.id)}">🇰🇷 번역</button>
    </div>
    <div class="card-translation" id="trans-${escAttr(item.id)}" style="display:none;"></div>`;

    // 저장 버튼
    const isSaved = item.saved === true;
    const saveBtn = `<button class="btn-save ${isSaved ? 'saved' : ''}" onclick="toggleSave('${escAttr(item.id)}')" title="${isSaved ? '저장 취소' : '저장'}">${isSaved ? '⭐' : '☆'}</button>`;

    // action button
    let actionBtn = '';
    if (item.status === 'applied') {
      actionBtn = `<button class="btn-applied" disabled>반영완료 ✓</button>`;
    } else if (item.status === 'approved') {
      actionBtn = `<button class="btn-apply approved" onclick="openModal('${escAttr(item.id)}')">승인됨 — 챕터 변경</button>`;
    } else {
      actionBtn = `<button class="btn-apply" onclick="openModal('${escAttr(item.id)}')">스크립트 반영 →</button>`;
    }

    return `
    <div class="card ${item.status !== 'inbox' ? item.status : ''}" id="card-${escAttr(item.id)}">
      <div class="card-header">
        <div class="card-badges">${platBadge}${tagB}</div>
      </div>
      ${authorLine}
      ${titleLine}
      ${bodyLine}
      ${statsLine}
      <div class="card-actions">${saveBtn}${actionBtn}</div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/'/g,"\\'");
}

// ── Modal ─────────────────────────────────────────────────────────
// 항목 → 추천 챕터 자동 분류
function suggestChapter(item) {
  const text = ((item.title||'') + ' ' + (item.description||'') + ' ' + (item.tag||'') + ' ' + (item.full_name||'')).toLowerCase();
  if (text.includes('install') || text.includes('설치') || text.includes('setup') || text.includes('get start') || text.includes('시작')) return { ch:'CH00', reason:'설치/시작 관련 — 강의 소개·환경 셋업 챕터에 적합합니다.' };
  if (text.includes('claude.md') || text.includes('memory') || text.includes('메모리') || text.includes('context')) return { ch:'CH01', reason:'CLAUDE.md·메모리 관련 — CH01 기본 활용에 참고 자료로 추가하기 좋습니다.' };
  if (text.includes('hooks') || text.includes('훅') || text.includes('trigger') || text.includes('skill')) return { ch:'CH01', reason:'Hooks/Skills 관련 — CH01-08 훅 챕터에 반영하면 좋습니다.' };
  if (text.includes('sub-agent') || text.includes('subagent') || text.includes('서브에이전트') || text.includes('parallel')) return { ch:'CH02', reason:'서브에이전트 관련 — CH02 서브에이전트 시스템 챕터에 적합합니다.' };
  if (text.includes('team') || text.includes('multi-agent') || text.includes('멀티 에이전트') || text.includes('orchestrat')) return { ch:'CH03', reason:'멀티 에이전트 팀 관련 — CH03 에이전트 팀 코워크 챕터에 적합합니다.' };
  if (text.includes('mcp') || text.includes('model context protocol') || text.includes('server') && text.includes('claude')) return { ch:'CH05', reason:'MCP 서버 관련 — CH05 MCP & 외부 도구 연동 챕터에 딱 맞습니다.' };
  if (text.includes('visual') || text.includes('chart') || text.includes('graph') || text.includes('시각화') || text.includes('대시보드') || text.includes('dashboard')) return { ch:'CH06', reason:'시각화 관련 — CH06 시각화 전략 자동 설계 챕터에 참고 자료로 추가하기 좋습니다.' };
  if (text.includes('d3') || text.includes('vega') || text.includes('interactive')) return { ch:'CH07', reason:'D3.js·인터랙티브 시각화 관련 — CH07에 적합합니다.' };
  if (text.includes('antigravity') || text.includes('windsurf') || text.includes('ide')) return { ch:'CH08', reason:'IDE/에디터 관련 — CH08 Antigravity 챕터에 적합합니다.' };
  if (text.includes('marketing') || text.includes('마케팅') || text.includes('campaign') || text.includes('roas')) return { ch:'CH09', reason:'마케팅 분석 관련 — CH09 마케팅 대시보드 챕터에 적합합니다.' };
  if (text.includes('a/b') || text.includes('ab test') || text.includes('테스트') || text.includes('experiment')) return { ch:'CH10', reason:'A/B 테스트 관련 — CH10에 적합합니다.' };
  if (text.includes('pm') || text.includes('kpi') || text.includes('dau') || text.includes('retention') && !text.includes('hr')) return { ch:'CH11', reason:'PM KPI 관련 — CH11 PM KPI 시각화 챕터에 적합합니다.' };
  if (text.includes('cohort') || text.includes('ltv') || text.includes('churn') || text.includes('리텐션')) return { ch:'CH12', reason:'리텐션·코호트 분석 관련 — CH12에 적합합니다.' };
  if (text.includes('hr') || text.includes('recruit') || text.includes('채용') || text.includes('employee')) return { ch:'CH13', reason:'HR 관련 — CH13 HR 자동화 챕터에 적합합니다.' };
  if (text.includes('openclaw') || text.includes('pipeline') || text.includes('automat') || text.includes('자동화')) return { ch:'CH14', reason:'자동화 파이프라인 관련 — CH14 Openclaw 파이프라인 챕터에 적합합니다.' };
  if (text.includes('prompt') || text.includes('프롬프트') || text.includes('instruction')) return { ch:'CH01', reason:'프롬프트·지시 작성 관련 — CH01-06 효과적인 지시 작성에 적합합니다.' };
  // 기본값: Claude Code 일반
  return { ch:'CH01', reason:'Claude Code 일반 내용 — CH01 기본 활용 챕터에 참고 자료로 추가하기 좋습니다.' };
}

function openModal(id) {
  currentItem = allItems.find(i => i.id === id);
  if (!currentItem) return;
  document.getElementById('modal-item-title').textContent = currentItem.title || currentItem.full_name || '';
  document.getElementById('modal-note').value = currentItem.note || '';
  
  const suggest = suggestChapter(currentItem);
  selectedChapter = currentItem.chapter || suggest.ch;
  document.getElementById('modal-recommend-chapter').textContent = '→ ' + selectedChapter;
  document.getElementById('modal-recommend-reason').textContent = suggest.reason;
  
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  currentItem = null;
}

function confirmApply() {
  if (!currentItem) return;
  const note = document.getElementById('modal-note').value;
  currentItem.status = 'approved';
  currentItem.chapter = selectedChapter;
  currentItem.note = note;
  saveLocal(currentItem);
  closeModal();
  renderCards();
  console.log(`[승인] ${currentItem.title} → ${selectedChapter}`);
}

// ── Save ─────────────────────────────────────────────────────────
function toggleSave(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  item.saved = !item.saved;
  saveLocal(item);
  renderCards();
}

// ── Translation ──────────────────────────────────────────────────
const transCache = {};

async function translateCard(id, btn) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  
  const transDiv = document.getElementById('trans-' + id.replace(/['"]/g, ''));
  if (!transDiv) return;
  
  // 이미 번역됨 → 토글
  if (transDiv.style.display !== 'none' && transDiv.textContent) {
    transDiv.style.display = 'none';
    btn.textContent = '🇰🇷 번역';
    return;
  }
  
  // 캐시 확인
  const text = item.description || item.title || '';
  if (transCache[id]) {
    transDiv.textContent = transCache[id];
    transDiv.style.display = 'block';
    btn.textContent = '🇰🇷 숨기기';
    return;
  }
  
  btn.textContent = '번역 중...';
  btn.classList.add('loading');
  
  try {
    // MyMemory 무료 번역 API
    const q = encodeURIComponent(text.substring(0, 500));
    const r = await fetch(`https://api.mymemory.translated.net/get?q=${q}&langpair=en|ko`);
    const data = await r.json();
    const translated = data.responseData?.translatedText || '';
    
    if (translated && translated !== text) {
      transCache[id] = translated;
      transDiv.textContent = translated;
      transDiv.style.display = 'block';
      btn.textContent = '🇰🇷 숨기기';
    } else {
      btn.textContent = '🇰🇷 번역';
    }
  } catch(e) {
    btn.textContent = '🇰🇷 번역';
    console.error('translate failed:', e);
  }
  btn.classList.remove('loading');
}

function saveLocal(item) {
  const idx = localItems.findIndex(i => i.id === item.id);
  if (idx >= 0) localItems[idx] = item;
  else localItems.push(item);
  localStorage.setItem('ai-feed-local', JSON.stringify(localItems));
  const idx2 = allItems.findIndex(i => i.id === item.id);
  if (idx2 >= 0) allItems[idx2] = item;
}

// ── Add URL (platform-aware) ───────────────────────────────────────
async function addUrl() {
  const rawUrl = document.getElementById('url-input').value.trim();
  if (!rawUrl) return;

  const platform = detectPlatform(rawUrl);
  const id = 'manual-' + Date.now();
  const item = {
    id,
    type: 'manual',
    platform,
    title: rawUrl,
    description: '',
    url: rawUrl,
    stars: 0,
    score: 0,
    comments: 0,
    tag: '기타',
    status: 'inbox',
    fetched_at: new Date().toISOString(),
    author: '',
    created_at: new Date().toISOString(),
  };

  // GitHub → parse repo info
  const ghMatch = rawUrl.match(/github\.com\/([^\/]+\/[^\/\?#]+)/);
  if (ghMatch) {
    item.full_name = ghMatch[1];
    item.title = ghMatch[1].split('/')[1];
    item.tag = 'Claude Code';
    item.platform = 'GitHub';
  }

  // HN → parse id
  const hnMatch = rawUrl.match(/news\.ycombinator\.com\/item\?id=(\d+)/);
  if (hnMatch) {
    item.platform = 'HN';
    item.hn_url = rawUrl;
    item.title = 'HN #' + hnMatch[1];
  }

  allItems.unshift(item);
  saveLocal(item);
  document.getElementById('url-input').value = '';
  renderCards();
}

// ── Init ──────────────────────────────────────────────────────────
loadFeed();

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
